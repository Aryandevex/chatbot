<!DOCTYPE html>
<html>
<head>
    <title>Chatbot</title>
    <style>
        body {
            font-family: Arial;
        }
        #chat-box {
            width: 400px;
            height: 400px;
            border: 1px solid #ccc;
            overflow-y: scroll;
            padding: 10px;
            margin-bottom: 10px;
        }
        .user {
            text-align: right;
            color: blue;
        }
        .bot {
            text-align: left;
            color: green;
        }
        button {
            margin-top: 5px;
        }
    </style>
</head>
<body>

<h2>Chatbot</h2>

<div id="chat-box"></div>

<input type="text" id="message" placeholder="Type message..." required>

<br>

<button onclick="sendMessage()">Send</button>
<button onclick="getSentiment()">Sentiment</button>
<button onclick="getSummary()">Summary</button>

<br><br>

<a href="/logout/">Logout</a>

<script>
function appendMessage(sender, text) {
    let chatBox = document.getElementById("chat-box");

    if (sender === "user") {
        chatBox.innerHTML += `<p class="user">You: ${text}</p>`;
    } else {
        chatBox.innerHTML += `<p class="bot">Bot: ${text}</p>`;
    }

    chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage() {
    let message = document.getElementById("message").value;
    if (!message) return;

    appendMessage("user", message);

    fetch(`/chat/get-response/?message=${message}`)
    .then(res => res.json())
    .then(data => {
        appendMessage("bot", data.response);
    });

    document.getElementById("message").value = "";
}

function getSentiment() {
    let message = document.getElementById("message").value;
    if (!message) return;

    appendMessage("user", message);

    fetch(`/chat/sentiment/?message=${message}`)
    .then(res => res.json())
    .then(data => {
        appendMessage("bot", "Sentiment: " + data.response);
    });

    document.getElementById("message").value = "";
}

function getSummary() {
    let message = document.getElementById("message").value;
    if (!message) return;

    appendMessage("user", message);

    fetch(`/chat/summary/?message=${message}`)
    .then(res => res.json())
    .then(data => {
        appendMessage("bot", "Summary: " + data.response);
    });

    document.getElementById("message").value = "";
}
</script>

</body>
</html>
